<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'none'; object-src 'none';"/>
  <title>Daily Briefing — Manuel Cortés</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#0f0f0f; --surface:#1a1a1a; --border:#2e2e2e; --text:#e8e6e1; --text-muted:#8a8680; --accent:#c8a96e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Source Serif 4',Georgia,serif; font-size:17px; line-height:1.8; max-width:820px; margin:0 auto; padding:2rem 1.5rem 6rem; min-height:100vh; display:flex; flex-direction:column; }
    header { border-bottom:1px solid var(--border); padding-bottom:1.5rem; margin-bottom:3rem; }
    .label { font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.5rem; }
    h1 { font-size:2rem; font-weight:600; color:var(--accent); line-height:1.2; margin-bottom:0.25rem; }
    .byline { font-size:0.85rem; color:var(--text-muted); font-style:italic; }
    .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:1rem; padding:4rem 0; }
    .icon { width:32px; height:32px; border:1px solid var(--border); border-radius:50%; margin:0 auto; opacity:0.4; }
    .center h2 { font-size:1.1rem; font-weight:400; color:var(--text-muted); }
    .center p { font-size:0.88rem; color:var(--text-muted); max-width:420px; }
    footer { text-align:center; font-size:0.75rem; color:var(--text-muted); border-top:1px solid var(--border); padding-top:2rem; margin-top:4rem; }
  </style>
</head>
<body>
<header>
  <div class="label">Daily Briefing</div>
  <h1>En preparación</h1>
  <div class="byline">Manuel Cortés &mdash; Ingeniero de Datos</div>
</header>
<div class="center">
  <svg class="icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="15" stroke="#8a8680" stroke-width="1"/>
    <line x1="16" y1="8" x2="16" y2="16" stroke="#8a8680" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="21" y2="21" stroke="#8a8680" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <h2>El primer briefing se generará pronto</h2>
  <p>El agente buscará noticias en tiempo real y publicará la primera edición cuando se ejecute el workflow de GitHub Actions.</p>
</div>
<footer>mnlcortes.github.io/daily-briefing</footer>
</body>
</html>
