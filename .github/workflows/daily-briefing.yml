name: Daily Briefing

on:
 # schedule:
 #   - cron: "0 11 * * *"
  workflow_dispatch:

# Denegar todo por defecto — cada job declara solo lo que necesita
permissions: {}

jobs:
  generate:
    name: Generar briefing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Solo este job necesita escribir en el repo
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: agent/requirements.txt

      - name: Instalar dependencias
        run: pip install -r agent/requirements.txt

      - name: Verificar secret
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY no configurado en GitHub Secrets"
            echo "   Ve a Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Secret verificado"

      - name: Generar briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent/generate_briefing.py

      - name: Verificar output
        run: |
          if [ ! -f docs/index.html ]; then
            echo "❌ docs/index.html no fue generado"
            exit 1
          fi
          BYTES=$(wc -c < docs/index.html)
          if [ "$BYTES" -lt 2000 ]; then
            echo "❌ HTML demasiado pequeño ($BYTES bytes) — posible error"
            exit 1
          fi
          echo "✅ HTML generado correctamente ($BYTES bytes)"

      - name: Commit y push
        run: |
          git config user.name  "Daily Briefing Bot"
          git config user.email "actions@github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "Sin cambios. Nada que publicar."
          else
            git commit -m "briefing: $(date +'%Y-%m-%d')"
            git push
            echo "✅ Publicado en GitHub Pages"
          fi
